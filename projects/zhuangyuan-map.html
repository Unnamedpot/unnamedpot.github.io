  .stat-qing { color: #3498db; }

  .popup-ming { background: #7f1c14; color: #f9a8a8; }
  .popup-qing { background: #1a4a7a; color: #a8c8f9; }
  .popup-list { max-height: 240px; overflow-y: auto; }
  .popup-item {
    padding: 5px 0; border-bottom: 1px solid #2d4a7a; font-size: 13px;
    display: flex; gap: 8px; align-items: baseline;
  }
  .popup-item:last-child { border-bottom: none; }
  .popup-year { color: #aaa; font-size: 12px; white-space: nowrap; }
  .popup-name { color: #f0e0b0; }
  .popup-from { color: #80a8d0; font-size: 11px; }
  .legend {
    position: absolute; bottom: 30px; right: 10px;
    background: rgba(22,33,62,0.95); border: 1px solid #2d4a7a;
    border-radius: 8px; padding: 12px 16px; z-index: 1000;
    font-size: 13px; min-width: 150px;
  }
  .legend h4 { color: #e2b96f; margin-bottom: 8px; font-size: 13px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
  .dot-ming { background: #e74c3c; }
  .dot-qing { background: #3498db; }
  .dot-both { background: #9b59b6; }
  #tooltip {
    position:fixed; background: rgba(22,33,62,0.97); border: 1px solid #e2b96f;

    display: none; z-index: 9999; color: #eee; max-width: 220px;

  .popup-list::-webkit-scrollbar-thumb { background: #2d4a7a; border-radius: 2px; }

// Amap (GCJ-02) tile — subdomains 1-4
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  attribution: '© <a href="https://www.amap.com/" target="_blank">高德地图</a>',
  subdomains: ['1','2','3','4'],
  maxZoom: 18
}).addTo(map);

// WGS-84 → GCJ-02 conversion (Mars coordinate system)
function wgs2gcj(lat, lng) {
  const a = 6378245.0, ee = 0.00669342162296594323;
  function outOfChina(lat, lng) {
    return lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271;
  }
  function transformLat(x, y) {
    let ret = -100 + 2*x + 3*y + 0.2*y*y + 0.1*x*y + 0.2*Math.sqrt(Math.abs(x));
    ret += (20*Math.sin(6*x*Math.PI) + 20*Math.sin(2*x*Math.PI)) * 2/3;
    ret += (20*Math.sin(y*Math.PI) + 40*Math.sin(y/3*Math.PI)) * 2/3;
    ret += (160*Math.sin(y/12*Math.PI) + 320*Math.sin(y*Math.PI/30)) * 2/3;
    return ret;
  }
  function transformLng(x, y) {
    let ret = 300 + x + 2*y + 0.1*x*x + 0.1*x*y + 0.1*Math.sqrt(Math.abs(x));
    ret += (20*Math.sin(6*x*Math.PI) + 20*Math.sin(2*x*Math.PI)) * 2/3;
    ret += (20*Math.sin(x*Math.PI) + 40*Math.sin(x/3*Math.PI)) * 2/3;
    ret += (150*Math.sin(x/12*Math.PI) + 300*Math.sin(x/30*Math.PI)) * 2/3;
    return ret;
  }
  if (outOfChina(lat, lng)) return [lat, lng];
  let dLat = transformLat(lng - 105, lat - 35);
  let dLng = transformLng(lng - 105, lat - 35);
  const radLat = lat / 180 * Math.PI;
  let magic = Math.sin(radLat);
  magic = 1 - ee * magic * magic;
  const sqrtMagic = Math.sqrt(magic);
  dLat = (dLat * 180) / ((a * (1-ee)) / (magic * sqrtMagic) * Math.PI);
  dLng = (dLng * 180) / (a / sqrtMagic * Math.cos(radLat) * Math.PI);
  return [lat + dLat, lng + dLng];
}

// Group nearby points into clusters by key
function clusterKey(lat, lng) {
  return Math.round(lat * 20) + '_' + Math.round(lng * 20);
}

let currentFilter = 'all';
let markerGroup = L.layerGroup().addTo(map);

function getColor(dynasties) {
  if (dynasties.ming && dynasties.qing) return '#9b59b6';
  if (dynasties.ming) return '#e74c3c';
  return '#3498db';
}

function buildMarkers(filter){
  markerGroup.clearLayers();
  const clusters = {};

  const allData = [
    ...mingData.map(d => ({...d, dynasty: 'ming'})),
    ...qingData.map(d => ({...d, dynasty: 'qing'}))
  ];

  let mingCount = 0, qingCount = 0;

  allData.forEach(d => {
    if (filter !== 'all' && d.dynasty !== filter) return;
    if (d.dynasty === 'ming') mingCount++;
    else qingCount++;

    const [glat, glng] = wgs2gcj(d.lat, d.lng);
    const key = clusterKey(glat, glng);
    if (!clusters[key]) clusters[key] = {lat: glat, lng: glng, items: [], dynasties: {}};
    clusters[key].items.push(d);
    clusters[key].dynasties[d.dynasty] = true;
  });

  document.getElementById('ming-count').textContent = filter === 'qing' ? 0 : mingCount;
  document.getElementById('qing-count').textContent = filter === 'ming' ? 0 : qingCount;
  document.getElementById('total-count').textContent = mingCount + qingCount;

  Object.values(clusters).forEach(cluster => {
    const count = cluster.items.length;
    const color = getColor(cluster.dynasties);
    const radius = Math.min(6 + count * 2.5, 28);

    const marker = L.circleMarker([cluster.lat, cluster.lng], {
      radius: radius,
      fillColor: color,
      color: '#fff',
      weight: 1.5,
      opacity: 0.9,
      fillOpacity: 0.82
    });

    // Build title: normalize to "府+county", drop province prefix.
    // All prefecture names in this dataset are exactly 2 chars (苏州、宁波、顺天…)
    // so slice from (indexOf('府') - 2): "南直隶苏州府吴县" -> "苏州府吴县"
    //                                    "江苏苏州府吴县"   -> "苏州府吴县"  (same, deduped)
    //                                    "满洲正黄旗"       -> "满洲正黄旗"  (no 府, kept)
    const normPlace = s => {
      const fi = s.indexOf('府');
      if (fi < 0) return s;
      return s.slice(Math.max(0, fi - 2));
    };
    const normed = [...new Set(cluster.items.map(d => normPlace(d.place)))];

    let titleText;
    if (normed.length === 1) {
      titleText = normed[0];
    } else {
      const prefMatch = normed[0].match(/^(.+?府)/);
      const pref = prefMatch ? prefMatch[1] : null;
      if (pref && normed.every(s => s.startsWith(pref))) {
        // Same prefecture: "苏州府吴县 / 长洲县 / 元和县"
        const counties = [...new Set(normed.map(s => s.slice(pref.length)))].filter(Boolean);
        titleText = pref + counties.join(' / ');
      } else {
        titleText = normed.join(' / ');
      }
    }
    let popupHtml = '<div class="popup-title">' + titleText + ' · ' + count + '位状元</div>';

    // Sort by year
    cluster.items.sort((a, b) => a.year - b.year);

    // Dynasty badges
    const hasMing = cluster.dynasties.ming;
    const hasQing = cluster.dynasties.qing;
    if (hasMing) popupHtml += '<span class="popup-dynasty popup-ming">明朝</span> ';
    if (hasQing) popupHtml += '<span class="popup-dynasty popup-qing">清朝</span>';
    popupHtml += '<div class="popup-list">';

    cluster.items.forEach(item => {
      const dClass = item.dynasty === 'ming' ? 'popup-ming' : 'popup-qing';
      popupHtml += `<div class="popup-item">
        <span class="popup-dynasty ${dClass}" style="padding:1px 5px;font-size:11px">${item.dynasty==='ming'?'明':'清'}</span>
        <span class="popup-year">${item.year}年</span>
        <span class="popup-name">${item.name}</span>
        <span class="popup-from">${item.place}</span>
      </div>`;
    });
    popupHtml += '</div>';

    marker.bindPopup(popupHtml, {maxWidth: 320, minWidth: 240});

    // Count label for large clusters
    if (count > 1) {
      const icon = L.divIcon({
        html: `<div style="width:${radius*2}px;height:${radius*2}px;border-radius:50%;background:${color};color:#fff;font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.4)">${count}</div>`,
        iconSize: [radius*2, radius*2],
        iconAnchor: [radius, radius],
        className: ''
      });
      const labelMarker = L.marker([cluster.lat, cluster.lng], {icon});
      labelMarker.bindPopup(popupHtml, {maxWidth: 320, minWidth: 240});
      markerGroup.addLayer(labelMarker);
    } else {
      markerGroup.addLayer(marker);
    }
  });
}

function filterDynasty(dynasty) {
  currentFilter = dynasty;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.btn-' + (dynasty === 'all' ? 'all' : dynasty)).classList.add('active');
  buildMarkers(dynasty);
}

buildMarkers('all');

// Legend
const legend = L.control({position: 'bottomright'});
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `<h4>图例</h4>
    <div class="legend-item"><span class="legend-dot dot-ming"></span>明朝状元</div>
    <div class="legend-item"><span class="legend-dot dot-qing"></span>清朝状元</div>
    <div class="legend-item"><span class="legend-dot dot-both"></span>两朝均有</div>
    <div style="margin-top:8px;color:#888;font-size:11px">圆圈大小反映人数</div>`;
  return div;
};
legend.addTo(map);
