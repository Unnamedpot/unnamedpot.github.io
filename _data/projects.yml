# ===================================================================
# Projects data
# Each entry renders one project card on the homepage and /project/ page.
# Fields:
#   name:        Project identifier / title (required)
#   alias:       Optional short alias shown next to the name; leave empty to hide
#   desc:        Short project description (required)
#   landing_url: In-site relative path to the project landing page (e.g. /projects/virtual-takeout/)
#   github_url:  Full external GitHub repository URL (output as-is)
#   cover:       Optional thumbnail path; leave empty to fall back to the default avatar
# ===================================================================

- name: "virtual_takeout_app"
  alias: "今晚不吃 · Tonight, No Eat"
  desc: "一款虚拟外卖 App，保留点外卖的满足感，不保留外卖本身。"
  landing_url: "/projects/virtual-takeout/"
  github_url: "https://github.com/Unnamedpot/virtual_takeout_app"
  cover: ""